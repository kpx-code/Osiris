<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OSIRIS BY KPX (UOTAM Matrix) - Live BTC Core Nodes</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://unpkg.com/lightweight-charts/dist/lightweight-charts.standalone.production.js"></script>
</head>
<body>
    <div id="dashboard">
        <header>
    <h1>UOTAM v7.7 Scalp Engine <span class="live-dot"></span></h1>
    <h2>OSIRIS BY KPX (UOTAM Matrix) - Live BTC Core Nodes</h2>
    <p>Live Bitcoin Grid & Core Micro Nodes (3-6-9) / Expiraties</p>
    <nav style="display: block; margin-top: 10px;">
        <a href="about.html" style="color: #00ffcc; text-decoration: none; font-weight: bold;">About & Disclaimer →</a>
    </nav>
    </header>
        <div class="timeframe-selector" style="margin: 20px 0; display: flex; gap: 10px;">
        <button onclick="changeTimeframe('15m')" id="btn-15m" style="padding: 8px 16px; background: #00ffcc; color: #131722; border: 1px solid #00ffcc; cursor: pointer; border-radius: 4px; font-weight: bold;">15m</button>
        </div>

    <div id="ohlc-overlay" style="margin-bottom: 10px; padding: 10px; background: #131722; border: 1px solid #1f2233; border-radius: 4px; color: #d1d4dc; font-family: monospace; font-size: 14px;">
        <span style="color: #00ffcc; font-weight: bold;">BTC/USDT</span> | 
        O: <span id="ohlc-open">-</span> | 
        H: <span id="ohlc-high">-</span> | 
        L: <span id="ohlc-low">-</span> | 
        C: <span id="ohlc-close">-</span>
    </div>

    <div id="chart-container"></div>

    <div id="info-panel" style="margin-top: 20px;">
        <div class="card">
            <h3>Volgende Core Micro Node</h3>
            <p id="next-core-node">Berekenen...</p>
        </div>
        <div class="card">
            <h3>Volgende Cyclus Expiratie (8-Polair)</h3>
            <p id="next-expiration">Berekenen...</p>
        </div>
    </div>
    <script src="/Osiris/app.js"></script>
</body>
</html>
